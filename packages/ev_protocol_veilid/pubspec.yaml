name: ev_protocol_veilid
description: >
  Concrete implementation of ev_protocol interfaces using Veilid DHT
  and local SQLite (Drift) for offline-first data persistence.
publish_to: none

version: 0.1.0

environment:
  sdk: ^3.7.1

dependencies:
  drift: ^2.32.1
  ev_protocol:
    path: ../ev_protocol
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.6.0+eol
  veilid:
    git:
      url: https://gitlab.com/veilid/veilid.git
      path: veilid-flutter
      ref: main

dev_dependencies:
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
  lints: ^6.0.0
  test: ^1.31.0
