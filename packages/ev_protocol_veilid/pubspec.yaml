name: ev_protocol_veilid
description: >
  Local SQLite (Drift) database layer for Sailor.
  Post-cleanup: Veilid DHT removed. Retained for package name compatibility
  until ev_db rename is done.
publish_to: none

version: 0.2.0

environment:
  sdk: ^3.7.1

dependencies:
  drift: ^2.32.1
  ev_protocol:
    path: ../ev_protocol
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
  lints: ^6.0.0
  test: ^1.31.0
