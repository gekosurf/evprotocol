name: sailor
description: "Sailor — event discovery for the sailing community."
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.11.4

dependencies:
  drift: ^2.32.1
  ev_protocol:
    path: ../../packages/ev_protocol
  ev_protocol_at:
    path: ../../packages/ev_protocol_at
  ev_protocol_veilid:
    path: ../../packages/ev_protocol_veilid
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.2.0
  image_picker: ^1.2.1
  latlong2: ^0.9.1
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
